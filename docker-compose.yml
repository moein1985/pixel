services:
  postgres:
    image: postgres:16-alpine
    container_name: pixel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pixel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pixel}
      POSTGRES_DB: ${POSTGRES_DB:-pixel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pixel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pixel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pixel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pixel_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pixel_minio_strong}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pixel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pixel}:${POSTGRES_PASSWORD:-pixel}@postgres:5432/${POSTGRES_DB:-pixel}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: production
      API_PORT: 4000
      SMS_PROVIDER: ${SMS_PROVIDER:-kavenegar}
      SMS_API_KEY: ${SMS_API_KEY:-placeholder}
      SMS_SENDER: ${SMS_SENDER:-1000xxxx}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: pixel-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_AI_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"

  ai:
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
    container_name: pixel-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pixel}:${POSTGRES_PASSWORD:-pixel}@postgres:5432/${POSTGRES_DB:-pixel}
      REDIS_URL: redis://redis:6379
      AI_PORT: 8000
      NODE_API_URL: http://api:4000
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: pixel-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-pixel}:${POSTGRES_PASSWORD:-pixel}@postgres:5432/${POSTGRES_DB:-pixel}

  nginx:
    image: nginx:alpine
    container_name: pixel-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - ai
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
